# AuroraOS build configuration — sourced by every script
export LFS=/mnt/lfs
export LFS_DISK=/dev/sdb          # WILL BE WIPED by 01-prepare-disk.sh
# Build-host arch IS the target arch (LFS builds natively; aarch64 builds
# run inside an aarch64 VM — see docs/build-host-utm.md)
export AURORA_ARCH=${AURORA_ARCH:-$(uname -m)}
case "$AURORA_ARCH" in
  x86_64)
    export KERNEL_IMAGE=arch/x86/boot/bzImage
    export GRUB_TARGET=x86_64-efi        # grub-install
    export LDSO=/lib64/ld-linux-x86-64.so.2
    export FIREFOX_PLATFORM=linux-x86_64
    ;;
  aarch64)
    export KERNEL_IMAGE=arch/arm64/boot/Image
    export GRUB_TARGET=arm64-efi
    export LDSO=/lib/ld-linux-aarch64.so.1
    export FIREFOX_PLATFORM=linux-aarch64
    ;;
  *) echo "!! unsupported AURORA_ARCH: $AURORA_ARCH (x86_64|aarch64)"; return 1 2>/dev/null || exit 1 ;;
esac
export LFS_TGT=${AURORA_ARCH}-lfs-linux-gnu
export LFS_VERSION=12.3
export LFS_BOOK=https://www.linuxfromscratch.org/lfs/downloads/${LFS_VERSION}
export MAKEFLAGS="-j$(nproc)"
export NINJAJOBS=$(nproc)
export DISTRO_NAME=AuroraOS
export DISTRO_VERSION=1.0
export DISTRO_CODENAME=daybreak
export DISTRO_USER=aneek
export KERNEL_VERSION=6.13.4      # matches LFS 12.3 linux tarball
export FIREFOX_VERSION=140.0esr   # prebuilt binary, official mozilla CDN (first ESR with linux-aarch64)
export STAMPS=$LFS/var/lib/aurora-build
export PATH=/usr/bin:/usr/sbin:$PATH
umask 022

stamp(){ [ -f "$STAMPS/$1" ]; }
mark(){ mkdir -p "$STAMPS"; touch "$STAMPS/$1"; }
